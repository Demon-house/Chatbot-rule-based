<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>AI Assistant</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>
    <body>
        <div class="app">
            <aside class="sidebar">
                <div class="logo"><div class="logo-icon">🤖</div><div class="logo-text"><div class="title">AI Assistant</div><div class="subtitle">ML Powered Chatbot</div></div></div>
                <button class="new-chat">+ New Chat</button>
                <nav class="menu">
                    <button class="item active">Chat</button>
                    <button class="item">Knowledge</button>
                    <button class="item">Settings</button>
                </nav>
            </aside>

            <main class="container">
                <header class="header">
                    <div class="header-left"></div>
                    <div class="profile">🤖</div>
                </header>

                <section id="chatbox" class="chatbox" role="log" aria-live="polite">
                    <div class="welcome">
                        <h1>Hello, Developer!</h1>
                        <p>Ask me anything about your project.</p>
                    </div>
                </section>

                <div class="composer">
                    <textarea id="msg" placeholder="Type a message and press Enter to send" aria-label="Message"></textarea>
                    <button id="sendBtn" class="send">Send</button>
                    <div id="typingIndicator" class="typing" aria-hidden="true">Assistant is typing<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
                </div>
            </main>
        </div>

        <script src="/static/script.js"></script>
    </body>
</html>
